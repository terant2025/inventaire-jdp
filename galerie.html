<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Julie de Pierrepont — Catalogue des œuvres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0b;--bg2:#121210;--surface:#181816;
  --border:#252520;--border2:#32322c;
  --text:#e6e0d8;--muted:#6e6860;--accent:#a09080;
  --gold:#c4a45a;--gold2:#8a6e38;
  --red:#c0392b;--green:#2d6a4f;--blue:#2c5f8a;--purple:#6b3fa0;--orange:#c47a1a;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:12px;font-weight:300;letter-spacing:.04em;min-height:100vh}

/* HEADER */
.site-header{
  padding:52px 52px 36px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
  position:sticky;top:0;z-index:50;background:rgba(12,12,11,.96);backdrop-filter:blur(12px);
}
.header-left a{text-decoration:none}
.site-eyebrow{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.site-title{font-family:var(--serif);font-size:clamp(20px,3vw,32px);font-weight:300;letter-spacing:.14em;color:var(--text)}
.site-subtitle{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted);margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-link{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2);
  padding-bottom:3px;transition:all .25s;
}
.back-link:hover{color:var(--text);border-color:var(--gold)}
.total-count{font-size:10px;color:var(--muted);letter-spacing:.1em}
.total-count strong{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--text);display:block;line-height:1}

/* FILTER BAR */
.filter-bar{
  padding:14px 52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:40;
}
.filter-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.filter-label{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);flex-shrink:0}

.tab-group{display:flex;gap:2px;flex-wrap:wrap}
.tab{
  background:none;border:1px solid var(--border);padding:5px 13px;
  font-family:var(--sans);font-size:8px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--gold);border-color:var(--gold);color:var(--bg)}

.filter-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.result-count{font-size:9px;letter-spacing:.12em;color:var(--muted);padding:4px 10px;background:var(--surface);border:1px solid var(--border);white-space:nowrap}
.view-toggle{display:flex;gap:2px}
.view-btn{padding:5px 9px;background:var(--surface);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;transition:all .2s}
.view-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* STATUS COLORS */
.s-disponible{color:#2d6a4f}.s-vendu{color:#c0392b}
.s-expose{color:#2c5f8a}.s-collection{color:#6b3fa0}

/* GALLERY GRID */
#gallery{
  padding:20px 52px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:2px;
}
#gallery.list-mode{
  grid-template-columns:1fr;
  gap:1px;
}

/* CARD */
.card{
  background:var(--surface);cursor:pointer;
  border:2px solid transparent;transition:border-color .2s;
  position:relative;overflow:hidden;
}
.card.hidden{display:none!important}
.card:hover{border-color:var(--gold)}
.card-img{aspect-ratio:1;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .4s}
.card-img img{filter:brightness(.85) saturate(.85)}
.card:hover .card-img img{transform:scale(1.05);filter:brightness(1) saturate(1)}
.card-img-ph{font-size:28px;opacity:.15;user-select:none}
.card-body{padding:10px 12px 14px}
.card-serie{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.card-title{font-family:var(--serif);font-size:15px;font-weight:400;line-height:1.3;margin-bottom:5px;color:var(--text)}
.card-title em{color:var(--muted);font-style:italic;font-size:13px}
.card-tech{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:3px}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-year{font-size:9px;color:var(--muted);letter-spacing:.1em}
.card-dims{font-size:9px;color:var(--muted)}
.card-statut{font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-weight:400}
.card-prix{font-family:var(--serif);font-size:13px;color:var(--text);margin-top:4px}

/* LIST MODE */
.card.list-card{
  display:grid;
  grid-template-columns:64px 1fr auto;
  align-items:center;gap:0;
}
.card.list-card .card-img{aspect-ratio:unset;width:64px;height:56px;flex-shrink:0}
.card.list-card .card-body{padding:8px 16px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.card.list-card .card-title{font-size:14px;margin-bottom:0;flex:1;min-width:160px}
.card.list-card .card-tech{margin-bottom:0}
.card.list-card .card-meta{flex-shrink:0}
.card.list-card .card-serie{display:none}

/* SECTION HEADER in grid */
.serie-section-header{
  grid-column:1/-1;
  padding:32px 0 12px;
  border-bottom:1px solid var(--border);
  margin-bottom:2px;
  display:flex;align-items:baseline;gap:16px;
}
.serie-section-header h2{font-family:var(--serif);font-size:24px;font-weight:300;letter-spacing:.1em;color:var(--text)}
.serie-section-header span{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.serie-section-header.hidden{display:none}

/* EMPTY */
#empty{display:none;text-align:center;padding:80px 20px;grid-column:1/-1}
#empty p{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted)}
#empty .icon{font-size:40px;opacity:.2;margin-bottom:14px}

/* LIGHTBOX */
#lightbox{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(6,6,5,.98);flex-direction:column;
  align-items:center;justify-content:center;
}
#lightbox.open{display:flex}
.lb-close{
  position:absolute;top:20px;right:28px;
  background:none;border:none;color:var(--muted);
  font-size:22px;cursor:pointer;transition:color .2s;z-index:10;line-height:1;padding:6px;
}
.lb-close:hover{color:var(--text)}
.lb-main{
  position:relative;width:100%;
  height:calc(100vh - 160px);
  display:flex;align-items:center;justify-content:center;
  padding:0 70px;
}
.lb-img-wrap{
  max-width:100%;max-height:100%;
  display:flex;align-items:center;justify-content:center;
}
#lb-img{
  max-width:100%;max-height:calc(100vh - 160px);
  object-fit:contain;display:block;
  transition:opacity .22s ease;
  box-shadow:0 0 60px rgba(0,0,0,.6);
}
#lb-img.fade{opacity:0}
.lb-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(18,18,16,.8);border:1px solid var(--border2);
  color:var(--muted);width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;
}
.lb-btn:hover{background:var(--surface);color:var(--text);border-color:var(--accent)}
#lb-prev{left:12px}#lb-next{right:12px}
.lb-info{
  position:absolute;bottom:90px;left:0;right:0;
  padding:0 80px;display:flex;align-items:flex-end;justify-content:space-between;
  pointer-events:none;
}
.lb-caption{pointer-events:none}
.lb-title{font-family:var(--serif);font-size:18px;color:var(--text);margin-bottom:4px}
.lb-meta{font-size:10px;color:var(--muted);letter-spacing:.1em;line-height:1.7}
.lb-counter{font-size:9px;letter-spacing:.18em;color:var(--muted);flex-shrink:0}

/* STRIP */
.lb-strip{
  position:absolute;bottom:0;left:0;right:0;height:86px;
  display:flex;align-items:center;gap:3px;padding:0 80px;
  overflow-x:auto;scrollbar-width:none;
  background:linear-gradient(to top,rgba(6,6,5,1),rgba(6,6,5,.7));
}
.lb-strip::-webkit-scrollbar{display:none}
.strip-thumb{
  flex-shrink:0;width:54px;height:54px;object-fit:cover;
  cursor:pointer;opacity:.3;border:1px solid transparent;transition:all .2s;
}
.strip-thumb.active,.strip-thumb:hover{opacity:1;border-color:var(--gold)}
.strip-ph{
  flex-shrink:0;width:54px;height:54px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;opacity:.2;cursor:pointer;border:1px solid transparent;transition:all .2s;
}
.strip-ph.active,.strip-ph:hover{opacity:.6;border-color:var(--gold)}

/* FOOTER */
.site-footer{
  text-align:center;padding:28px 52px;border-top:1px solid var(--border);
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
}

/* RESPONSIVE */
@media(max-width:768px){
  .site-header{padding:24px 20px 18px;flex-direction:column;align-items:flex-start;gap:12px}
  .filter-bar{padding:12px 20px}
  #gallery{padding:12px 20px 40px}
  .lb-main{padding:0 50px}
  .lb-strip{padding:0 12px}
  .lb-info{padding:0 20px;bottom:95px}
  .site-footer{padding:20px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <div class="header-left">
    <a href="./">
      <p class="site-eyebrow">Art Textile Contemporain</p>
      <h1 class="site-title">Julie de Pierrepont</h1>
      <p class="site-subtitle">Catalogue des œuvres</p>
    </a>
  </div>
  <div class="header-right">
    <div class="total-count"><strong id="total-num">—</strong>œuvres</div>
    <a href="./" class="back-link">← Site</a>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Série</span>
  <div class="tab-group" id="tabs-serie">
    <button class="tab active" data-serie="" onclick="setFilter('serie','',this)">Toutes</button>
  </div>
  <div class="filter-sep"></div>
  <span class="filter-label">Année</span>
  <div class="tab-group" id="tabs-annee">
    <button class="tab active" data-annee="" onclick="setFilter('annee','',this)">Toutes</button>
  </div>
  <div class="filter-sep"></div>
  <span class="filter-label">Statut</span>
  <div class="tab-group" id="tabs-statut">
    <button class="tab active" data-statut="" onclick="setFilter('statut','',this)">Tous</button>
    <button class="tab" data-statut="disponible" onclick="setFilter('statut','disponible',this)">Disponible</button>
    <button class="tab" data-statut="vendu" onclick="setFilter('statut','vendu',this)">Vendu</button>
    <button class="tab" data-statut="expose" onclick="setFilter('statut','expose',this)">Exposé</button>
    <button class="tab" data-statut="collection" onclick="setFilter('statut','collection',this)">Collection</button>
  </div>
  <div class="filter-right">
    <span class="result-count" id="result-count">—</span>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grille">⊞</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')" title="Liste">☰</button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery">
  <div id="empty"><div class="icon">🧵</div><p>Aucune œuvre ne correspond aux filtres</p></div>
</div>

<!-- FOOTER -->
<div class="site-footer">
  Julie de Pierrepont — Art Textile Contemporain · <a href="./" style="color:var(--muted);text-decoration:none">juliedepierrepont.com</a>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <div class="lb-main">
    <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">←</button>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
    <button class="lb-btn" id="lb-next" onclick="lbNav(1)">→</button>
  </div>
  <div class="lb-info">
    <div class="lb-caption">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-meta" id="lb-meta"></div>
    </div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
  <div class="lb-strip" id="lb-strip"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, onSnapshot }
                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyDw27kfc2K5N8_kXlbE3rYLu0KJRLu2lqE",
  authDomain:        "inventaire-jdp.firebaseapp.com",
  projectId:         "inventaire-jdp",
  storageBucket:     "inventaire-jdp.firebasestorage.app",
  messagingSenderId: "944682383871",
  appId:             "1:944682383871:web:d91538cfbe3a339979cfca"
};

const app = initializeApp(firebaseConfig);
const fdb = getFirestore(app);

// ── STATE ──────────────────────────────────────────────────────
let oeuvres   = [];
let series    = [];
let filtered  = [];
let lbItems   = [];   // current lightbox set (filtered)
let lbIdx     = 0;
let currentView = 'grid';
let filters   = { serie:'', annee:'', statut:'' };

const STATUS_LABEL = {disponible:'Disponible',vendu:'Vendu',expose:'Exposé',collection:'Collection privée'};
const STATUS_CLASS = {disponible:'s-disponible',vendu:'s-vendu',expose:'s-expose',collection:'s-collection'};

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData(){
  // Series config
  const configSnap = await getDocs(collection(fdb,'config'));
  configSnap.docs.forEach(d=>{ if(d.id==='series') series=d.data().list||[]; });

  // Realtime oeuvres
  onSnapshot(collection(fdb,'oeuvres'), snap=>{
    oeuvres = snap.docs.map(d=>({id:d.id,...d.data()}));
    buildFilterTabs();
    applyFilters();
  });
}

// ── BUILD FILTER TABS ─────────────────────────────────────────
function buildFilterTabs(){
  // Series tabs
  const allSeries = [...series, ...oeuvres.map(o=>o.serie).filter(s=>s&&!series.includes(s))];
  const serieContainer = document.getElementById('tabs-serie');
  serieContainer.innerHTML = '<button class="tab'+(filters.serie===''?' active':'')+'" onclick="setFilter(\'serie\',\'\',this)">Toutes</button>';
  allSeries.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='tab'+(filters.serie===s?' active':'');
    btn.textContent=s;
    btn.onclick=()=>setFilter('serie',s,btn);
    serieContainer.appendChild(btn);
  });

  // Année tabs
  const years=[...new Set(oeuvres.map(o=>o.annee).filter(Boolean))].sort((a,b)=>b-a);
  const anneeContainer = document.getElementById('tabs-annee');
  anneeContainer.innerHTML = '<button class="tab'+(filters.annee===''?' active':'')+'" onclick="setFilter(\'annee\',\'\',this)">Toutes</button>';
  years.forEach(y=>{
    const btn=document.createElement('button');
    btn.className='tab'+(filters.annee===y?' active':'');
    btn.textContent=y;
    btn.onclick=()=>setFilter('annee',y,btn);
    anneeContainer.appendChild(btn);
  });
}

// ── FILTERS ───────────────────────────────────────────────────
window.setFilter=(type,val,btn)=>{
  filters[type]=val;
  // Deactivate siblings
  btn.closest('.tab-group').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
};

function applyFilters(){
  filtered = oeuvres.filter(o=>{
    if(filters.serie  && o.serie  !== filters.serie)  return false;
    if(filters.annee  && o.annee  !== filters.annee)  return false;
    if(filters.statut && o.statut !== filters.statut) return false;
    return true;
  });

  // Sort by series order then year
  filtered.sort((a,b)=>{
    const ai=series.indexOf(a.serie),bi=series.indexOf(b.serie);
    const ad=ai<0?999:ai, bd=bi<0?999:bi;
    if(ad!==bd) return ad-bd;
    return (a.annee||'').localeCompare(b.annee||'');
  });

  document.getElementById('total-num').textContent = oeuvres.length;
  document.getElementById('result-count').textContent = filtered.length+' œuvre'+(filtered.length>1?'s':'');
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const gallery = document.getElementById('gallery');
  const empty   = document.getElementById('empty');
  Array.from(gallery.children).forEach(c=>{ if(c!==empty) c.remove(); });

  if(!filtered.length){ empty.style.display='block'; return; }
  empty.style.display='none';

  // Build groups map
  const groupMap = {};
  oeuvres.forEach(o=>{
    if(o.groupe){ if(!groupMap[o.groupe])groupMap[o.groupe]=[]; groupMap[o.groupe].push(o); }
  });

  // Determine which oeuvres to show in grid
  // For grouped: only show the principal (or first if none marked)
  const shownIds = new Set();
  const gridItems = filtered.filter(o=>{
    if(!o.groupe) return true; // ungrouped: always show
    const grp = groupMap[o.groupe]||[];
    const principal = grp.find(x=>x.groupePrincipal) || grp[0];
    if(o.id===principal?.id){
      shownIds.add(o.groupe);
      return true;
    }
    return false;
  });

  if(currentView==='grid'){
    gallery.className='';
    const groups={};
    gridItems.forEach(o=>{ const k=o.serie||'Sans série'; if(!groups[k])groups[k]=[]; groups[k].push(o); });
    const orderedKeys=[...series,...Object.keys(groups).filter(k=>!series.includes(k))];
    orderedKeys.forEach(serie=>{
      if(!groups[serie]) return;
      const hdr=document.createElement('div');
      hdr.className='serie-section-header';
      hdr.innerHTML=`<h2>${serie}</h2><span>${groups[serie].length} œuvre${groups[serie].length>1?'s':''}</span>`;
      gallery.appendChild(hdr);
      groups[serie].forEach(o=>{
        const grpItems = o.groupe ? (groupMap[o.groupe]||[]) : null;
        gallery.appendChild(makeCard(o, grpItems, false));
      });
    });
  } else {
    gallery.className='list-mode';
    gridItems.forEach(o=>{
      const grpItems = o.groupe ? (groupMap[o.groupe]||[]) : null;
      gallery.appendChild(makeCard(o, grpItems, true));
    });
  }
  lbItems=[...filtered];
}

function imgSrc(o){
  // Vignette grille : base64 Firestore en priorité
  if(o.imgUrl) return o.imgUrl;
  // Sinon URL Drive ou chemin relatif
  if(o.imgHD) return o.imgHD;
  return '';
}

function imgHD(o){
  // Plein écran lightbox : URL Drive haute résolution en priorité
  if(o.imgHD) return o.imgHD;
  // Fallback : même que la vignette
  return imgSrc(o);
}

function dimLabel(o){
  const p=[o.hauteur,o.largeur,o.profondeur].filter(Boolean);
  return p.length ? p.join(' × ')+' cm' : '';
}

function makeCard(o, grpItems, isList){
  const d=document.createElement('div');
  d.className='card'+(isList?' list-card':'');
  const src=imgSrc(o);
  const dims=dimLabel(o);
  const techLine=[o.annee,o.technique].filter(Boolean).join(' — ');
  const extraViews = grpItems && grpItems.length>1 ? grpItems.length-1 : 0;

  d.innerHTML=`
    <div class="card-img" style="position:relative">
      ${src?`<img src="${src}" alt="${o.titre||o.fichier||''}" loading="lazy">`:'<div class="card-img-ph">🖼</div>'}
      ${extraViews>0?`<div style="position:absolute;bottom:8px;right:8px;background:rgba(12,12,11,.82);border:1px solid var(--gold2);color:var(--gold);font-size:9px;letter-spacing:.1em;padding:3px 8px;pointer-events:none">+${extraViews} vue${extraViews>1?'s':''}</div>`:''}
    </div>
    <div class="card-body">
      <div class="card-serie">${o.serie||'—'}</div>
      <div class="card-title">${o.titre||`<em>${o.fichier||'Sans titre'}</em>`}</div>
      ${techLine?`<div class="card-tech">${techLine}</div>`:''}
      <div class="card-meta">
        ${dims?`<span class="card-dims">${dims}</span>`:''}
        ${o.statut?`<span class="card-statut ${STATUS_CLASS[o.statut]||''}">${STATUS_LABEL[o.statut]||o.statut}</span>`:''}
        ${o.prix?`<span class="card-prix">${Number(o.prix).toLocaleString('fr-FR')} €</span>`:''}
      </div>
    </div>`;

  d.addEventListener('click',()=>{
    if(grpItems && grpItems.length>1){
      // Open lightbox with group items
      openLBGroup(grpItems, 0);
    } else {
      const idx=lbItems.indexOf(o);
      openLB(idx>=0?idx:0);
    }
  });
  return d;
}

// ── VIEW ──────────────────────────────────────────────────────
window.setView=v=>{
  currentView=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  render();
};

// ── LIGHTBOX ──────────────────────────────────────────────────
let lbMode = 'global'; // 'global' or 'group'
let lbGroupItems = [];

function openLB(idx){
  lbMode='global';
  lbIdx=idx;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  renderLB();
}

function openLBGroup(grpItems, startIdx){
  lbMode='group';
  lbGroupItems=grpItems;
  lbIdx=startIdx;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  renderLB();
}

window.closeLB=()=>{
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
};

window.lbNav=dir=>{
  const items = lbMode==='group' ? lbGroupItems : lbItems;
  lbIdx=(lbIdx+dir+items.length)%items.length;
  renderLB();
};

function renderLB(){
  const items = lbMode==='group' ? lbGroupItems : lbItems;
  const o=items[lbIdx];
  if(!o) return;
  const src=imgHD(o);
  const thumb=imgSrc(o);
  const img=document.getElementById('lb-img');

  img.classList.add('fade');
  setTimeout(()=>{
    if(src){ img.src=src; img.style.display='block'; }
    else { img.style.display='none'; }
    img.classList.remove('fade');
  },200);

  const items = lbMode==='group' ? lbGroupItems : lbItems;
  document.getElementById('lb-title').textContent = o.titre||o.fichier||'Sans titre';
  const grpLabel = lbMode==='group' ? ` · Vue ${lbIdx+1}/${items.length}` : '';
  const meta=[o.serie,o.annee,o.technique,dimLabel(o)].filter(Boolean).join(' · ');
  document.getElementById('lb-meta').textContent = meta + grpLabel;
  document.getElementById('lb-counter').textContent = (lbIdx+1)+' / '+items.length;

  // Strip — vignettes
  const strip=document.getElementById('lb-strip');
  strip.innerHTML='';
  items.forEach((item,i)=>{
    const s=imgSrc(item);
    if(s){
      const t=document.createElement('img');
      t.className='strip-thumb'+(i===lbIdx?' active':'');
      t.src=s; t.loading='lazy'; t.title=item.titre||item.fichier||'';
      t.addEventListener('click',()=>{ lbIdx=i; renderLB(); });
      strip.appendChild(t);
    } else {
      const t=document.createElement('div');
      t.className='strip-ph'+(i===lbIdx?' active':'');
      t.textContent='🖼';
      t.addEventListener('click',()=>{ lbIdx=i; renderLB(); });
      strip.appendChild(t);
    }
  });
  setTimeout(()=>{
    const active=strip.querySelector('.active');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },60);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowRight') lbNav(1);
  else if(e.key==='ArrowLeft') lbNav(-1);
  else if(e.key==='Escape') closeLB();
});
document.getElementById('lightbox').addEventListener('click',e=>{
  if(e.target===document.getElementById('lightbox')) closeLB();
});

loadData();
</script>
