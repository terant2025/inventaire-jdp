<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Julie de Pierrepont — Catalogue des œuvres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0b;--bg2:#141412;--surface:#1a1a17;
  --border:#252520;--border2:#32322c;
  --text:#e6e0d8;--muted:#6e6860;--accent:#a09080;
  --gold:#c4a45a;--gold2:#8a6e38;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:12px;font-weight:300;letter-spacing:.04em;min-height:100vh}

#loading{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading.out{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted)}

.site-header{padding:40px 52px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;background:rgba(12,12,11,.96);position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}
.site-eyebrow{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.site-title{font-family:var(--serif);font-size:clamp(20px,3vw,30px);font-weight:300;letter-spacing:.14em;color:var(--text);text-decoration:none;display:block}
.site-meta{font-size:9px;color:var(--muted);text-align:right;line-height:1.8}
.site-meta strong{display:block;font-family:var(--serif);font-size:22px;font-weight:300;color:var(--text);line-height:1;margin-bottom:3px}

.filter-bar{padding:10px 52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.fg{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fsep{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 4px}
.fl{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.tab{background:none;border:1px solid var(--border);padding:4px 11px;font-family:var(--sans);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover,.tab.active{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.fr{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.cnt{font-size:9px;color:var(--muted);padding:3px 9px;background:var(--surface);border:1px solid var(--border);white-space:nowrap}
.vt{display:flex;gap:2px}
.vb{padding:5px 8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;transition:all .2s}
.vb.active{background:var(--text);color:var(--bg);border-color:var(--text)}

#gallery{padding:18px 52px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:2px}
#gallery.list-mode{grid-template-columns:1fr;gap:1px}

.card{background:var(--surface);border:2px solid transparent;cursor:pointer;transition:border-color .2s;overflow:hidden}
.card:hover{border-color:var(--gold)}
.ci{aspect-ratio:1;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative}
.ci img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.82) saturate(.85);transition:transform .5s,filter .4s}
.card:hover .ci img{transform:scale(1.05);filter:brightness(1) saturate(1)}
.ci-ph{font-size:26px;opacity:.15}
.cbadge{position:absolute;bottom:7px;right:7px;background:rgba(12,12,11,.82);border:1px solid var(--gold2);color:var(--gold);font-size:8px;letter-spacing:.1em;padding:3px 8px}
.cb{padding:9px 11px 13px}
.cs{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.ct{font-family:var(--serif);font-size:14px;font-weight:400;line-height:1.3;margin-bottom:4px;color:var(--text)}
.ct em{color:var(--muted);font-style:italic;font-size:12px}
.ck{font-size:9px;color:var(--muted);line-height:1.5;margin-bottom:2px}
.cd{font-size:9px;color:var(--muted)}
.s-disponible{color:#2d6a4f}.s-vendu{color:#c0392b}.s-expose{color:#2c5f8a}.s-collection{color:#6b3fa0}
.cst{font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

.lc{display:grid;grid-template-columns:56px 1fr;align-items:center}
.lc .ci{aspect-ratio:unset;width:56px;height:52px}
.lc .cb{padding:8px 14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;border-left:1px solid var(--border)}
.lc .ct{font-size:13px;margin-bottom:0;flex:1;min-width:130px}
.lc .cs{display:none}

.sh{grid-column:1/-1;padding:26px 0 9px;border-bottom:1px solid var(--border);margin-bottom:2px;display:flex;align-items:baseline;gap:12px}
.sh h2{font-family:var(--serif);font-size:21px;font-weight:300;letter-spacing:.1em;color:var(--text)}
.sh span{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty .ic{font-size:36px;opacity:.2;margin-bottom:12px}
.empty p{font-family:var(--serif);font-style:italic;font-size:17px}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;z-index:1000;background:rgba(6,6,5,.98);flex-direction:column}
#lb.open{display:flex}
.liz{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:0 68px;min-height:0;overflow:hidden}
#li{max-width:100%;max-height:calc(100vh - 185px);object-fit:contain;display:block;transition:opacity .2s}
#li.fade{opacity:0}
.la{position:absolute;top:50%;transform:translateY(-50%);background:rgba(18,18,16,.85);border:1px solid var(--border2);color:var(--muted);width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all .2s;user-select:none}
.la:hover{background:var(--surface);color:var(--text);border-color:var(--accent)}
#lp{left:10px}#ln{right:10px}
#lx{position:absolute;top:16px;right:22px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;z-index:10;line-height:1;padding:4px;transition:color .2s}
#lx:hover{color:var(--text)}
#lco{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;pointer-events:none;white-space:nowrap}
.lbot{width:100%;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:12px 76px 16px;background:linear-gradient(to top,rgba(6,6,5,.98) 55%,transparent)}
#lse{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
#lti{font-family:var(--serif);font-size:19px;font-weight:300;color:var(--text);margin-bottom:4px;line-height:1.2}
#lde{font-size:10px;color:var(--muted);line-height:1.9}
#lde strong{color:var(--accent);font-weight:300}
/* Strip vignettes — navigation entre vues d'une même œuvre */
.lvs{display:flex;align-items:center;gap:3px;flex-shrink:0;max-width:40vw;overflow-x:auto}
.lv{width:48px;height:48px;object-fit:cover;cursor:pointer;opacity:.3;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.lv.active,.lv:hover{opacity:1;border-color:var(--gold)}
.lvp{width:48px;height:48px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.2;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.lvp.active,.lvp:hover{opacity:.6;border-color:var(--gold)}

.site-footer{padding:24px 52px;border-top:1px solid var(--border);text-align:center;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.site-footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2);padding-bottom:1px;transition:all .2s}
.site-footer a:hover{color:var(--text);border-color:var(--gold)}

@media(max-width:1024px){
  .site-header,.filter-bar,#gallery,.site-footer{padding-left:28px;padding-right:28px}
  #gallery{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .lbot{padding:10px 40px 14px}.liz{padding:0 56px}
}
@media(max-width:640px){
  .site-header{padding:18px 16px 14px;flex-direction:column;align-items:flex-start;gap:8px}
  .site-meta{text-align:left}
  .filter-bar,#gallery,.site-footer{padding-left:12px;padding-right:12px}
  .fsep{display:none}.tab{padding:3px 8px;font-size:7px}
  #gallery{grid-template-columns:repeat(2,1fr);gap:2px}
  .cb{padding:7px 8px 10px}
  .liz{padding:0 40px}#li{max-height:calc(100vh - 175px)}
  .lbot{padding:8px 12px 10px;flex-direction:column;gap:8px;align-items:flex-start}
  #lti{font-size:16px}#lde{font-size:9px}
  .la{width:34px;height:34px;font-size:14px}
  #lp{left:3px}#ln{right:3px}
  .lv,.lvp{width:40px;height:40px}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p class="loading-txt">Chargement des œuvres…</p></div>

<div class="site-header">
  <div>
    <div class="site-eyebrow">Art Textile Contemporain</div>
    <a class="site-title" href="index.html">Julie de Pierrepont</a>
  </div>
  <div class="site-meta"><strong id="s-total">—</strong>œuvres · Catalogue</div>
</div>

<div class="filter-bar">
  <div class="fg"><span class="fl">Série</span><div id="ts" class="fg"><button class="tab active" onclick="setFilter('serie','',this)">Toutes</button></div></div>
  <div class="fsep"></div>
  <div class="fg"><span class="fl">Année</span><div id="ta" class="fg"><button class="tab active" onclick="setFilter('annee','',this)">Toutes</button></div></div>
  <div class="fsep"></div>
  <div class="fg"><span class="fl">Statut</span>
    <div class="fg">
      <button class="tab active" onclick="setFilter('statut','',this)">Tous</button>
      <button class="tab" onclick="setFilter('statut','disponible',this)">Disponible</button>
      <button class="tab" onclick="setFilter('statut','vendu',this)">Vendu</button>
      <button class="tab" onclick="setFilter('statut','expose',this)">Exposé</button>
      <button class="tab" onclick="setFilter('statut','collection',this)">Collection</button>
    </div>
  </div>
  <div class="fr">
    <span class="cnt" id="cnt">—</span>
    <div class="vt">
      <button class="vb active" id="bg" onclick="setView('grid')">⊞</button>
      <button class="vb" id="bl" onclick="setView('list')">☰</button>
    </div>
  </div>
</div>

<div id="gallery"></div>
<div class="site-footer">Julie de Pierrepont — Art Textile Contemporain &ensp;·&ensp; <a href="index.html">← Retour au site</a></div>

<div id="lb">
  <button id="lx" onclick="closeLB()">✕</button>
  <div id="lco"></div>
  <div class="liz">
    <button class="la" id="lp" onclick="lbNavOeuvre(-1)">←</button>
    <img id="li" src="" alt="">
    <button class="la" id="ln" onclick="lbNavOeuvre(1)">→</button>
  </div>
  <div class="lbot">
    <div><div id="lse"></div><div id="lti"></div><div id="lde"></div></div>
    <div class="lvs" id="lvs"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const CONF={apiKey:"AIzaSyDw27kfc2K5N8_kXlbE3rYLu0KJRLu2lqE",authDomain:"inventaire-jdp.firebaseapp.com",projectId:"inventaire-jdp",storageBucket:"inventaire-jdp.firebasestorage.app",messagingSenderId:"944682383871",appId:"1:944682383871:web:d91538cfbe3a339979cfca"};
const app=initializeApp(CONF);
const fdb=getFirestore(app);

let oeuvres=[],series=[],lbList=[],lbOeuvre=0,lbVue=0,view='grid';
let filters={serie:'',annee:'',statut:''};
const SL={disponible:'Disponible',vendu:'Vendu',expose:'Exposé',collection:'Collection privée'};
const SC={disponible:'s-disponible',vendu:'s-vendu',expose:'s-expose',collection:'s-collection'};

// ══════════════════════════════════════════════════════════════
// STRUCTURE FIREBASE :
//
// imgUrl   : base64 — image principale (PowerShell, mise à jour par import)
//            utilisée pour la grille ET la lightbox si pas de vues[]
// vues[]   : [{imgUrl, fichier, principale}] — vues uploadées manuellement
//            (grandes images via panneau inventaire)
//            Si présentes, utilisées en lightbox uniquement
// groupe   : string — lie plusieurs documents entre eux
//
// Priorité grille   : imgUrl racine (toujours présent, taille contrôlée)
// Priorité lightbox : vues[principale].imgUrl || vues[0].imgUrl || imgUrl
// ══════════════════════════════════════════════════════════════

// Image pour la grille — toujours imgUrl racine
function getGridImg(o){
  return o.imgUrl||'';
}

// Image principale pour la lightbox — vues[] en priorité si disponibles
function getMainImg(o){
  if(o.vues&&o.vues.length){
    const v=o.vues.find(v=>v.principale)||o.vues[0];
    return v.imgUrl||o.imgUrl||'';
  }
  return o.imgUrl||'';
}

// Toutes les vues d'un document (vues[] internes)
function getVues(o){
  if(o.vues&&o.vues.length) return o.vues;
  // Pas de vues[] → l'imgUrl seule constitue la vue unique
  return [{imgUrl:o.imgUrl||'',fichier:o.fichier||'',principale:true}];
}

// Construire la liste lightbox :
// Chaque entrée = un document (ou groupe de documents)
// Les flèches naviguent entre entrées
// Les vignettes bas naviguent entre vues[] du document courant
function buildLbList(filtered){
  const seen=new Set();
  const out=[];
  filtered.forEach(o=>{
    if(!o.groupe){
      // Œuvre seule — ses vues sont o.vues[]
      out.push({rep:o, membres:[o]});
      return;
    }
    if(seen.has(o.groupe)) return;
    seen.add(o.groupe);
    // Groupe — chercher TOUS les membres dans oeuvres (pas filtered)
    const membres=oeuvres.filter(x=>x.groupe===o.groupe);
    const rep=membres.find(x=>getMainImg(x))||membres[0];
    out.push({rep, membres});
  });
  return out;
}

async function init(){
  try{const cfg=await getDocs(collection(fdb,'config'));cfg.forEach(d=>{if(d.id==='series')series=d.data().list||[];});}catch(e){series=[];}
  onSnapshot(collection(fdb,'oeuvres'),snap=>{
    oeuvres=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildTabs();applyFilters();
    const l=document.getElementById('loading');l.classList.add('out');setTimeout(()=>l.style.display='none',400);
  });
}

function buildTabs(){
  const allS=[...series,...oeuvres.map(o=>o.serie).filter(s=>s&&!series.includes(s))];
  const sc=document.getElementById('ts');
  sc.innerHTML=`<button class="tab${!filters.serie?' active':''}" onclick="setFilter('serie','',this)">Toutes</button>`;
  allS.forEach(s=>{const b=document.createElement('button');b.className='tab'+(filters.serie===s?' active':'');b.textContent=s;b.onclick=()=>setFilter('serie',s,b);sc.appendChild(b);});
  const years=[...new Set(oeuvres.map(o=>o.annee).filter(Boolean))].sort((a,b)=>b-a);
  const ac=document.getElementById('ta');
  ac.innerHTML=`<button class="tab${!filters.annee?' active':''}" onclick="setFilter('annee','',this)">Toutes</button>`;
  years.forEach(y=>{const b=document.createElement('button');b.className='tab'+(filters.annee===y?' active':'');b.textContent=y;b.onclick=()=>setFilter('annee',y,b);ac.appendChild(b);});
}

window.setFilter=(type,val,btn)=>{
  filters[type]=val;
  btn.closest('.fg').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
};

function applyFilters(){
  let f=oeuvres.filter(o=>{
    if(filters.serie&&o.serie!==filters.serie)return false;
    if(filters.annee&&o.annee!==filters.annee)return false;
    if(filters.statut&&o.statut!==filters.statut)return false;
    return true;
  }).sort((a,b)=>{
    const ai=series.indexOf(a.serie),bi=series.indexOf(b.serie);
    const ad=ai<0?999:ai,bd=bi<0?999:bi;
    return ad!==bd?ad-bd:(a.annee||'').localeCompare(b.annee||'');
  });
  lbList=buildLbList(f);
  document.getElementById('s-total').textContent=oeuvres.length;
  document.getElementById('cnt').textContent=lbList.length+' œuvre'+(lbList.length>1?'s':'');
  render(f);
}

function render(filtered){
  const g=document.getElementById('gallery');g.innerHTML='';
  if(!lbList.length){g.innerHTML='<div class="empty"><div class="ic">🧵</div><p>Aucune œuvre ne correspond</p></div>';return;}
  if(view==='grid'){
    g.className='';
    const allS=[...series,...lbList.map(x=>x.rep.serie).filter(s=>s&&!series.includes(s)),'Sans série'];
    const byS={};
    lbList.forEach(item=>{const k=item.rep.serie||'Sans série';if(!byS[k])byS[k]=[];byS[k].push(item);});
    allS.forEach(s=>{
      if(!byS[s]||!byS[s].length)return;
      const h=document.createElement('div');h.className='sh';
      h.innerHTML=`<h2>${s}</h2><span>${byS[s].length} œuvre${byS[s].length>1?'s':''}</span>`;
      g.appendChild(h);
      byS[s].forEach(item=>g.appendChild(makeCard(item,lbList.indexOf(item),false)));
    });
  } else {
    g.className='list-mode';
    lbList.forEach((item,oi)=>g.appendChild(makeCard(item,oi,true)));
  }
}

function makeCard(item,oi,isList){
  const {rep}=item;
  const img=getGridImg(rep);
  const dims=[rep.hauteur,rep.largeur,rep.profondeur].filter(Boolean).join(' × ');
  const tech=[rep.annee,rep.technique].filter(Boolean).join(' — ');

  // Compter TOUTES les vues : vues[] internes + membres du groupe
  const vuesInternes=getVues(rep).length;
  const nbMembres=item.membres.length;
  // Total affiché = vues internes du représentant + (membres-1) si groupe
  const totalVues = nbMembres>1
    ? nbMembres  // groupe : 1 entrée par membre
    : vuesInternes; // œuvre seule : ses vues internes

  const d=document.createElement('div');
  d.className='card'+(isList?' lc':'');
  d.innerHTML=`
    <div class="ci">
      ${img?`<img src="${img}" alt="${(rep.titre||'').replace(/"/g,'&quot;')}" loading="lazy">`:'<div class="ci-ph">🖼</div>'}
      ${totalVues>1?`<span class="cbadge">+${totalVues-1} vue${totalVues>2?'s':''}</span>`:''}
    </div>
    <div class="cb">
      <div class="cs">${rep.serie||'—'}</div>
      <div class="ct">${rep.titre||`<em>${rep.fichier||'Sans titre'}</em>`}</div>
      ${tech?`<div class="ck">${tech}</div>`:''}
      ${dims?`<div class="cd">${dims} cm</div>`:''}
      ${rep.statut?`<div class="cst ${SC[rep.statut]||''}">${SL[rep.statut]||rep.statut}</div>`:''}
    </div>`;
  d.addEventListener('click',()=>openLB(oi,0));
  return d;
}

window.setView=v=>{
  view=v;
  document.getElementById('bg').classList.toggle('active',v==='grid');
  document.getElementById('bl').classList.toggle('active',v==='list');
  applyFilters();
};

// ── LIGHTBOX ──────────────────────────────────────────────────
// lbOeuvre = index dans lbList (quelle œuvre / entrée)
// lbVue    = index dans la liste des vues de cette entrée
//
// Les "vues" en lightbox sont construites ainsi :
//   - Si œuvre seule   : o.vues[] du document (grandes images 1200px)
//   - Si groupe        : une vue par membre (chacun avec ses propres vues[])
//
// La strip du bas = vignettes pour naviguer entre vues de l'entrée courante

function getLbVues(item){
  // Pour un groupe : chaque membre contribue une "vue" (sa première image)
  if(item.membres.length>1){
    return item.membres.map(m=>({
      imgUrl: getMainImg(m),   // lightbox : grande image si dispo
      thumb:  getGridImg(m),   // strip vignette : imgUrl racine
      titre:  m.titre||m.fichier||'',
      doc:    m
    }));
  }
  // Œuvre seule : ses vues[] internes (grandes images)
  const vues=getVues(item.rep);
  return vues.map(v=>({
    imgUrl: v.imgUrl||'',
    thumb:  v.imgUrl||item.rep.imgUrl||'',
    titre:  v.fichier||'',
    doc:    item.rep
  }));
}

function openLB(oi,vi){
  lbOeuvre=oi;lbVue=vi||0;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
  document.addEventListener('keydown',lbKey);
  renderLB();
}
window.closeLB=()=>{
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow='';
  document.removeEventListener('keydown',lbKey);
};
window.lbNavOeuvre=d=>{lbOeuvre=(lbOeuvre+d+lbList.length)%lbList.length;lbVue=0;renderLB();};
function lbNavVue(vi){lbVue=vi;renderLB();}

function renderLB(){
  const item=lbList[lbOeuvre];
  const {rep}=item;
  const vues=getLbVues(item);
  const vue=vues[lbVue]||vues[0];

  // Image plein écran
  const imgEl=document.getElementById('li');
  imgEl.classList.add('fade');
  setTimeout(()=>{imgEl.src=vue.imgUrl||'';imgEl.classList.remove('fade');},180);

  // Compteur œuvres
  document.getElementById('lco').textContent=(lbOeuvre+1)+' / '+lbList.length;

  // Méta (toujours depuis le représentant)
  document.getElementById('lse').textContent=rep.serie||'';
  document.getElementById('lti').textContent=rep.titre||rep.fichier||'Sans titre';
  const dims=[rep.hauteur,rep.largeur,rep.profondeur].filter(Boolean).join(' × ');
  const det=[];
  if(rep.annee)det.push('<strong>'+rep.annee+'</strong>');
  if(rep.technique)det.push(rep.technique);
  if(dims)det.push(dims+' cm');
  document.getElementById('lde').innerHTML=det.join('&ensp;·&ensp;');

  // Strip vignettes — seulement si plusieurs vues
  const strip=document.getElementById('lvs');
  strip.innerHTML='';
  if(vues.length>1){
    vues.forEach((v,i)=>{
      if(v.imgUrl){
        const t=document.createElement('img');
        t.className='lv'+(i===lbVue?' active':'');
        t.src=v.thumb||v.imgUrl;
        t.title=v.titre||('Vue '+(i+1));
        t.onclick=()=>lbNavVue(i);
        strip.appendChild(t);
      } else {
        const t=document.createElement('div');
        t.className='lvp'+(i===lbVue?' active':'');
        t.textContent='🖼';t.onclick=()=>lbNavVue(i);
        strip.appendChild(t);
      }
    });
  }
}

function lbKey(e){
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowRight')lbNavOeuvre(1);
  if(e.key==='ArrowLeft')lbNavOeuvre(-1);
  if(e.key==='ArrowUp'){const v=getLbVues(lbList[lbOeuvre]);lbVue=Math.max(0,lbVue-1);renderLB();}
  if(e.key==='ArrowDown'){const v=getLbVues(lbList[lbOeuvre]);lbVue=Math.min(v.length-1,lbVue+1);renderLB();}
}
document.getElementById('lb').addEventListener('click',e=>{if(e.target===document.getElementById('lb'))closeLB();});
let tsX=0;
document.getElementById('lb').addEventListener('touchstart',e=>{tsX=e.touches[0].clientX;},{passive:true});
document.getElementById('lb').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tsX;if(Math.abs(dx)>50){dx<0?lbNavOeuvre(1):lbNavOeuvre(-1);}},{passive:true});

init();
</script>
</body>
</html>
