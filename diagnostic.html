function log(msg,cls){
  const d=document.getElementById('log');
  d.innerHTML+='<span'+(cls?' class="'+cls+'"':'')+'>'+msg+'</span>\n';
  d.scrollTop=d.scrollHeight;
}

window.runPatch=async function(){
  if(!confirm('Restaurer les metadonnees depuis le CSV ?')) return;
  log('Chargement Firestore...','ok');
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
  log(docs.length+' documents charges');

  const byId={};
  CSV.forEach(r=>{if(r.id)byId[r.id]=r;});
  log(Object.keys(byId).length+' entrees dans le CSV');

  let patched=0,notFound=0;
  for(let i=0;i<docs.length;i+=400){
    const chunk=docs.slice(i,i+400);
    const wb=writeBatch(fdb);
    let ops=0;
    chunk.forEach(o=>{
      const src=byId[o.id];
      if(src){
        wb.update(doc(fdb,'oeuvres',o.id),{
          ref:src.ref||'',fichier:src.fichier||o.fichier||'',
          dossier:src.dossier||o.dossier||'',serie:src.serie||'',
          titre:src.titre||'',annee:src.annee||'',technique:src.technique||'',
          hauteur:src.hauteur||'',largeur:src.largeur||'',profondeur:src.profondeur||'',
          prix:src.prix||'',statut:src.statut||'',localisation:src.localisation||'',
          notes:src.notes||'',
        });
        patched++;ops++;
      } else {
        notFound++;
      }
    });
    if(ops>0) await wb.commit();
    log('  '+(Math.min(i+400,docs.length))+' / '+docs.length+'...');
  }
  log('Patch termine : '+patched+' mis a jour, '+notFound+' non trouves','ok');
};

  document.getElementById('results').innerHTML='';
  log('Diagnostic...','ok');
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const oeuvres=snap.docs.map(d=>({id:d.id,...d.data()}));

  let iCount=0,hdCount=0;
  try{
    const is=await getDocs(collection(fdb,'images'));
    iCount=is.docs.length;
    is.docs.forEach(d=>{if(d.data().hdUrl)hdCount++;});
  }catch(e){}

  const avecImg   =oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>10).length;

  const avecRef   =oeuvres.filter(o=>o.ref).length;
  const avecVues  =oeuvres.filter(o=>o.vues&&o.vues.length>0).length;
  const sizes=oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>10).map(o=>o.imgUrl.length);
  const avg=sizes.length?Math.round(sizes.reduce((a,b)=>a+b,0)/sizes.length/1024):0;
  const max=sizes.length?Math.round(Math.max(...sizes)/1024):0;

  const problems=oeuvres.filter(o=>(!o.imgUrl||o.imgUrl.length<=10)||!o.serie);

  let html='<div class="section"><h2>oeuvres — '+oeuvres.length+' documents</h2>';
  html+='<div class="stat"><span class="label">Avec imgUrl</span><span class="val '+(avecImg===oeuvres.length?'ok':'warn')+'">'+avecImg+' / '+oeuvres.length+'</span></div>';
  html+='<div class="stat"><span class="label">Sans imgUrl</span><span class="val '+(sansImg===0?'ok':'err')+'">'+sansImg+'</span></div>';
  html+='<div class="stat"><span class="label">Avec titre</span><span class="val">'+avecTitre+' / '+oeuvres.length+'</span></div>';
  html+='<div class="stat"><span class="label">Avec serie</span><span class="val">'+avecSerie+' / '+oeuvres.length+'</span></div>';
  html+='<div class="stat"><span class="label">Avec ref</span><span class="val">'+avecRef+' / '+oeuvres.length+'</span></div>';
  html+='<div class="stat"><span class="label">Avec vues[]</span><span class="val">'+avecVues+'</span></div>';
  html+='<div class="stat"><span class="label">imgUrl moy / max</span><span class="val">'+avg+' Ko / '+max+' Ko</span></div>';
  html+='</div>';

  html+='<div class="section"><h2>images — '+iCount+' documents</h2>';
  html+='<div class="stat"><span class="label">Avec hdUrl (Storage)</span><span class="val '+(hdCount>0?'ok':'warn')+'">'+hdCount+'</span></div>';
  html+='<div class="stat"><span class="label">Couverture</span><span class="val '+(iCount>=oeuvres.length?'ok':'warn')+'">'+iCount+' / '+oeuvres.length+'</span></div>';
  html+='</div>';

  if(problems.length){
    html+='<div class="section"><h2>Problemes ('+problems.length+')</h2><table><tr><th>ID</th><th>Fichier</th><th>Serie</th><th>Titre</th><th>imgUrl</th></tr>';
    problems.slice(0,40).forEach(o=>{
      html+='<tr><td style="font-size:10px;color:#6e6860">'+o.id+'</td><td>'+(o.fichier||'-')+'</td><td>'+(o.serie||'<span class="err">-</span>')+'</td><td>'+(o.titre||'-')+'</td><td>'+(o.imgUrl?'<span class="badge ok">'+Math.round(o.imgUrl.length/1024)+'Ko</span>':'<span class="badge err">vide</span>')+'</td></tr>';
    });
    if(problems.length>40) html+='<tr><td colspan="5" style="color:#6e6860">... et '+(problems.length-40)+' autres</td></tr>';
    html+='</table></div>';
  } else {
    html+='<div class="section ok">Aucun probleme detecte</div>';
  }

  html+='<div class="section"><h2>Echantillon — 10 premiers</h2><table><tr><th>Apercu</th><th>ID</th><th>Ref</th><th>Fichier</th><th>Serie</th><th>Titre</th><th>imgUrl</th><th>vues</th></tr>';
  oeuvres.slice(0,10).forEach(o=>{
    html+='<tr><td>'+(o.imgUrl&&o.imgUrl.startsWith('data:')?'<img class="img-preview" src="'+o.imgUrl+'">':"🖼")+'</td><td style="font-size:10px;color:#6e6860">'+o.id+'</td><td>'+(o.ref||'-')+'</td><td style="font-size:10px">'+(o.fichier||'-')+'</td><td>'+(o.serie||'-')+'</td><td>'+(o.titre||'-')+'</td><td>'+(o.imgUrl?'<span class="badge ok">'+Math.round(o.imgUrl.length/1024)+'Ko</span>':'<span class="badge err">vide</span>')+'</td><td>'+(o.vues?o.vues.length:0)+'</td></tr>';
  });
  html+='</table></div>';

  document.getElementById('results').innerHTML=html;
  log('Diagnostic termine','ok');
};

window.cleanDups=async function(){
  if(!confirm('Supprimer les documents sans fichier ET sans imgUrl ?')) return;
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const dups=snap.docs.filter(d=>{const r=d.data();return(!r.fichier||!r.fichier.trim())&&(!r.imgUrl||!r.imgUrl.trim());});
  log(dups.length+' doublons identifies','warn');
  for(let i=0;i<dups.length;i+=400){
    const wb=writeBatch(fdb);
    dups.slice(i,i+400).forEach(d=>wb.delete(doc(fdb,'oeuvres',d.id)));
    await wb.commit();
  }
  log(dups.length+' supprimes','ok');
};
</script>
