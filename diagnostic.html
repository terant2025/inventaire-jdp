function log(msg,cls){
  const d=document.getElementById('log');
  d.innerHTML+='<span'+(cls?' class="'+cls+'"':'')+'>'+msg+'</span>\n';
  d.scrollTop=d.scrollHeight;
}

window.runPatch=async function(){
  if(!confirm('Restaurer les metadonnees en matchant par fichier+dossier ?')) return;
  log('Chargement Firestore...','ok');
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
  log(docs.length+' documents Firestore');

  const byFD={};
  CSV.forEach(r=>{if(r.key) byFD[r.key]=r;});
  log(Object.keys(byFD).length+' entrees dans le CSV (cle fichier+dossier)');

  let patched=0,notFound=0;
  for(let i=0;i<docs.length;i+=400){
    const chunk=docs.slice(i,i+400);
    const wb=writeBatch(fdb);
    let ops=0;
    chunk.forEach(o=>{
      const key=(o.fichier||'')+'|||'+(o.dossier||'');
      const src=byFD[key];
      if(src){
        wb.update(doc(fdb,'oeuvres',o.id),{
          ref:          src.ref||'',
          serie:        src.serie||'',
          titre:        src.titre||'',
          annee:        src.annee||'',
          technique:    src.technique||'',
          hauteur:      src.hauteur||'',
          largeur:      src.largeur||'',
          profondeur:   src.profondeur||'',
          prix:         src.prix||'',
          statut:       src.statut||'',
          localisation: src.localisation||'',
          notes:        src.notes||'',
        });
        patched++;ops++;
      } else {
        notFound++;
        log('Non trouve : '+(o.fichier||'-')+' / '+(o.dossier||'-'),'warn');
      }
    });
    if(ops>0) await wb.commit();
    log('  '+Math.min(i+400,docs.length)+' / '+docs.length+'...');
  }
  log('Patch termine : '+patched+' mis a jour, '+notFound+' non trouves','ok');
};

window.runDiag=async function(){
  document.getElementById('results').innerHTML='';
  log('Diagnostic...','ok');
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const oeuvres=snap.docs.map(d=>({id:d.id,...d.data()}));

  let iCount=0,hdCount=0;
  try{
    const is=await getDocs(collection(fdb,'images'));
    iCount=is.docs.length;
    is.docs.forEach(d=>{if(d.data().hdUrl)hdCount++;});
  }catch(e){}

  const avecImg   =oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>10).length;
  const sansImg   =oeuvres.filter(o=>!o.imgUrl||o.imgUrl.length<=10).length;
  const avecTitre =oeuvres.filter(o=>o.titre).length;
  const avecSerie =oeuvres.filter(o=>o.serie).length;
  const avecRef   =oeuvres.filter(o=>o.ref).length;
  const avecVues  =oeuvres.filter(o=>o.vues&&o.vues.length>0).length;
  const sizes=oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>10).map(o=>o.imgUrl.length);
  const avg=sizes.length?Math.round(sizes.reduce((a,b)=>a+b,0)/sizes.length/1024):0;
  const max=sizes.length?Math.round(Math.max(...sizes)/1024):0;
  const problems=oeuvres.filter(o=>(!o.imgUrl||o.imgUrl.length<=10)||!o.serie);

  let h='<div class="section"><h2>oeuvres — '+oeuvres.length+' documents</h2>';
  h+='<div class="stat"><span class="label">Avec imgUrl</span><span class="val '+(avecImg===oeuvres.length?'ok':'warn')+'">'+avecImg+' / '+oeuvres.length+'</span></div>';
  h+='<div class="stat"><span class="label">Sans imgUrl</span><span class="val '+(sansImg===0?'ok':'err')+'">'+sansImg+'</span></div>';
  h+='<div class="stat"><span class="label">Avec titre</span><span class="val">'+avecTitre+' / '+oeuvres.length+'</span></div>';
  h+='<div class="stat"><span class="label">Avec serie</span><span class="val">'+avecSerie+' / '+oeuvres.length+'</span></div>';
  h+='<div class="stat"><span class="label">Avec ref JDP-xxx</span><span class="val">'+avecRef+' / '+oeuvres.length+'</span></div>';
  h+='<div class="stat"><span class="label">Avec vues[]</span><span class="val">'+avecVues+'</span></div>';
  h+='<div class="stat"><span class="label">imgUrl moy / max</span><span class="val">'+avg+' Ko / '+max+' Ko</span></div>';
  h+='</div>';
  h+='<div class="section"><h2>images — '+iCount+' documents</h2>';
  h+='<div class="stat"><span class="label">Avec hdUrl Storage</span><span class="val '+(hdCount>0?'ok':'warn')+'">'+hdCount+'</span></div>';
  h+='<div class="stat"><span class="label">Couverture</span><span class="val '+(iCount>=oeuvres.length?'ok':'warn')+'">'+iCount+' / '+oeuvres.length+'</span></div>';
  h+='</div>';

  if(problems.length){
    h+='<div class="section"><h2>Problemes ('+problems.length+')</h2><table><tr><th>ID</th><th>Fichier</th><th>Dossier</th><th>Serie</th><th>Titre</th><th>imgUrl</th></tr>';
    problems.slice(0,40).forEach(o=>{
      h+='<tr>';
      h+='<td style="font-size:10px;color:#6e6860">'+o.id+'</td>';
      h+='<td>'+(o.fichier||'-')+'</td>';
      h+='<td style="font-size:10px;color:#6e6860">'+(o.dossier||'-')+'</td>';
      h+='<td>'+(o.serie||'<span class="err">-</span>')+'</td>';
      h+='<td>'+(o.titre||'-')+'</td>';
      h+='<td>'+(o.imgUrl?'<span class="badge ok">'+Math.round(o.imgUrl.length/1024)+'Ko</span>':'<span class="badge err">vide</span>')+'</td>';
      h+='</tr>';
    });
    if(problems.length>40) h+='<tr><td colspan="6" style="color:#6e6860">... et '+(problems.length-40)+' autres</td></tr>';
    h+='</table></div>';
  } else {
    h+='<div class="section"><span class="ok">Aucun probleme detecte</span></div>';
  }

  h+='<div class="section"><h2>Echantillon — 10 premiers</h2><table><tr><th>Apercu</th><th>ID</th><th>Ref</th><th>Fichier</th><th>Serie</th><th>Titre</th><th>imgUrl</th><th>vues</th></tr>';
  oeuvres.slice(0,10).forEach(o=>{
    h+='<tr>';
    h+='<td>'+(o.imgUrl&&o.imgUrl.startsWith('data:')
      ?'<img class="img-preview" src="'+o.imgUrl+'">'
      :'🖼')+'</td>';
    h+='<td style="font-size:10px;color:#6e6860">'+o.id+'</td>';
    h+='<td>'+(o.ref||'-')+'</td>';
    h+='<td style="font-size:10px">'+(o.fichier||'-')+'</td>';
    h+='<td>'+(o.serie||'-')+'</td>';
    h+='<td>'+(o.titre||'-')+'</td>';
    h+='<td>'+(o.imgUrl
      ?'<span class="badge ok">'+Math.round(o.imgUrl.length/1024)+'Ko</span>'
      :'<span class="badge err">vide</span>')+'</td>';
    h+='<td>'+(o.vues?o.vues.length:0)+'</td>';
    h+='</tr>';
  });
  h+='</table></div>';

  document.getElementById('results').innerHTML=h;
  log('Diagnostic termine','ok');
};

window.cleanDups=async function(){
  if(!confirm('Supprimer les documents sans fichier ET sans imgUrl ?')) return;
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const dups=snap.docs.filter(d=>{
    const r=d.data();
    return (!r.fichier||!r.fichier.trim())&&(!r.imgUrl||!r.imgUrl.trim());
  });
  log(dups.length+' doublons identifies','warn');
  for(let i=0;i<dups.length;i+=400){
    const wb=writeBatch(fdb);
    dups.slice(i,i+400).forEach(d=>wb.delete(doc(fdb,'oeuvres',d.id)));
    await wb.commit();
  }
  log(dups.length+' supprimes','ok');
};

window.runDiagVues=async function(){
  log('Analyse vues et groupes...','ok');
  const snap=await getDocs(collection(fdb,'oeuvres'));
  const oeuvres=snap.docs.map(d=>({id:d.id,...d.data()}));

  const avecVues    = oeuvres.filter(o=>o.vues&&o.vues.length>0);
  const avecGroupe  = oeuvres.filter(o=>o.groupe&&o.groupe.trim());
  const vues1       = oeuvres.filter(o=>o.vues&&o.vues.length===1);
  const vues2plus   = oeuvres.filter(o=>o.vues&&o.vues.length>1);
  const imgUrlGrand = oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>50000);
  const imgUrlPetit = oeuvres.filter(o=>o.imgUrl&&o.imgUrl.length>10&&o.imgUrl.length<=50000);

  let h='<div class="section"><h2>Vues et groupes</h2>';
  h+='<div class="stat"><span class="label">Avec vues[] (any)</span><span class="val">'+avecVues.length+'</span></div>';
  h+='<div class="stat"><span class="label">Avec vues[] > 1</span><span class="val">'+vues2plus.length+'</span></div>';
  h+='<div class="stat"><span class="label">Avec groupe</span><span class="val">'+avecGroupe.length+'</span></div>';
  h+='<div class="stat"><span class="label">imgUrl > 50Ko (grande)</span><span class="val">'+imgUrlGrand.length+'</span></div>';
  h+='<div class="stat"><span class="label">imgUrl 10-50Ko (petite)</span><span class="val">'+imgUrlPetit.length+'</span></div>';
  h+='</div>';

  // Exemples avec vues
  if(avecVues.length){
    h+='<div class="section"><h2>Exemples avec vues[] (5 premiers)</h2><table>';
    h+='<tr><th>ID</th><th>Fichier</th><th>Série</th><th>Nb vues</th><th>imgUrl Ko</th><th>vues[0] Ko</th><th>groupe</th></tr>';
    avecVues.slice(0,5).forEach(o=>{
      const v0=o.vues[0]||{};
      h+='<tr>';
      h+='<td style="font-size:10px;color:#6e6860">'+o.id+'</td>';
      h+='<td style="font-size:10px">'+(o.fichier||'-')+'</td>';
      h+='<td>'+(o.serie||'-')+'</td>';
      h+='<td>'+o.vues.length+'</td>';
      h+='<td>'+(o.imgUrl?Math.round(o.imgUrl.length/1024)+'Ko':'-')+'</td>';
      h+='<td>'+(v0.imgUrl?Math.round(v0.imgUrl.length/1024)+'Ko':'-')+'</td>';
      h+='<td>'+(o.groupe||'-')+'</td>';
      h+='</tr>';
    });
    h+='</table></div>';
  } else {
    h+='<div class="section"><span class="warn">⚠ Aucun document avec vues[] — les liens entre vues ne peuvent pas fonctionner</span></div>';
  }

  // Exemples avec groupe
  if(avecGroupe.length){
    h+='<div class="section"><h2>Exemples avec groupe (5 premiers)</h2><table>';
    h+='<tr><th>ID</th><th>Fichier</th><th>Groupe</th><th>Nb vues</th></tr>';
    avecGroupe.slice(0,5).forEach(o=>{
      h+='<tr><td style="font-size:10px;color:#6e6860">'+o.id+'</td><td>'+(o.fichier||'-')+'</td><td>'+o.groupe+'</td><td>'+(o.vues?o.vues.length:0)+'</td></tr>';
    });
    h+='</table></div>';
  } else {
    h+='<div class="section"><span class="warn">⚠ Aucun document avec groupe — les groupements entre œuvres ne fonctionnent pas</span></div>';
  }

  // Exemple complet d un document
  const exemple = avecVues.length ? avecVues[0] : oeuvres[0];
  h+='<div class="section"><h2>Structure complète — premier document</h2><pre style="white-space:pre-wrap;font-size:10px;color:#a09080">';
  const safe={...exemple};
  if(safe.imgUrl&&safe.imgUrl.length>100) safe.imgUrl='[base64 '+Math.round(safe.imgUrl.length/1024)+'Ko]';
  if(safe.vues) safe.vues=safe.vues.map(v=>{const sv={...v};if(sv.imgUrl&&sv.imgUrl.length>100)sv.imgUrl='[base64 '+Math.round(sv.imgUrl.length/1024)+'Ko]';return sv;});
  h+=JSON.stringify(safe,null,2);
  h+='</pre></div>';

  document.getElementById('results').innerHTML=h;
  log('Analyse terminee','ok');
};
